##
## Nginx reverse proxy configuration for watchkickoff.com
##
## Deployment:
##   sudo cp nginx/watchkickoff.conf /etc/nginx/sites-available/watchkickoff
##   sudo ln -s /etc/nginx/sites-available/watchkickoff /etc/nginx/sites-enabled/
##   sudo nginx -t && sudo nginx -s reload
##
## SSL: Cloudflare Full (Strict) mode.
##   Origin certificate installed at paths below.
##   Generate at: Cloudflare Dashboard → SSL/TLS → Origin Server → Create Certificate
##

upstream wk_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream wk_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

## Redirect HTTP → HTTPS (belt + braces — Cloudflare also does this at edge)
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    ## server_name is intentionally omitted — Cloudflare sends the request.
    ## Domain is not hardcoded here; it's controlled by Cloudflare.

    ## Cloudflare Origin Certificate — NOT a Let's Encrypt certificate.
    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    ## Security headers
    ## Note: HSTS, CSP, X-Frame-Options are added at Cloudflare edge.
    ## Only headers not managed by Cloudflare belong here.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    ## ── REST API ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://wk_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        ## Pass Cloudflare real IP to Fastify rate limiter
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
        ## Pass Nginx-generated request ID as correlation ID seed
        proxy_set_header   X-Correlation-ID  $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    ## ── WebSocket ───────────────────────────────────────────────
    ## Critical: Upgrade header must be set or Nginx strips it
    location /ws {
        proxy_pass         http://wk_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
        ## Long timeout — WebSocket connections are persistent
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    ## ── Health check (bypass rate limiting for uptime monitors) ──
    location /health {
        proxy_pass         http://wk_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    ## ── Next.js frontend — all other routes ─────────────────────
    location / {
        proxy_pass         http://wk_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    ## ── Gzip ─────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types      application/json text/html text/css text/javascript
                    application/javascript application/x-javascript;
}
